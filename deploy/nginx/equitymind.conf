# =============================================================================
# Хостовый nginx-vhost для EquityMind (положить в /etc/nginx/sites-available/,
# затем ln -s в sites-enabled/ и nginx -t && systemctl reload nginx).
#
# ЗАМЕНИ equitymind.EXAMPLE.RU на реальный поддомен (2 места).
# TLS-блок добавит certbot: certbot --nginx -d equitymind.EXAMPLE.RU
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name equitymind.EXAMPLE.RU;

    # После выпуска сертификата certbot сам добавит redirect на https
    # и server-блок с listen 443 ssl.

    location / {
        proxy_pass http://127.0.0.1:5180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Анализ идёт до пары минут — фронтовый nginx в контейнере уже держит
        # 300s, здесь должно быть не меньше.
        proxy_read_timeout 300s;
    }
}
