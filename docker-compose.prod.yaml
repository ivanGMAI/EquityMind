# =============================================================================
# EquityMind — production compose (same server as foodize).
# -----------------------------------------------------------------------------
# Все порты публикуются ТОЛЬКО на 127.0.0.1 — наружу смотрит хостовый nginx,
# который терминирует TLS поддомена и проксирует на loopback.
#
# Loopback-порты выбраны так, чтобы не конфликтовать с foodize на этом же
# сервере (занято: 8000 backend, 8080 tg-bot, 5173/5174 фронты, 3000/9090
# мониторинг):
#   frontend -> 127.0.0.1:5180   (весь трафик поддомена идёт сюда)
#   api      -> 127.0.0.1:8020   (напрямую не нужен; полезен для отладки)
#
# Запуск:   docker compose -f docker-compose.prod.yaml up -d --build
# Хостовый nginx: см. deploy/nginx/equitymind.conf и deploy/DEPLOY.md
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: equitymind:prod
    container_name: equitymind-api
    command:
      [
        "uvicorn",
        "equitymind.api.server:app",
        "--host", "0.0.0.0",
        "--port", "8000",
      ]
    ports:
      - "127.0.0.1:8020:8000"
    env_file:
      - path: .env
        required: false
    environment:
      EQUITYMIND_CONFIG: config/config.yaml
    volumes:
      - ./.equitymind_cache:/app/.equitymind_cache
      - ./reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - equitymind-network
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      target: production
    image: equitymind-frontend:prod
    container_name: equitymind-frontend
    depends_on:
      - api
    ports:
      - "127.0.0.1:5180:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - equitymind-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

networks:
  equitymind-network:
    name: equitymind-network
