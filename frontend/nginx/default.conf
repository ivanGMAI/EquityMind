server {
    listen 8080;
    server_name localhost;

    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
    # style-src 'unsafe-inline': Vite инлайнит критический CSS, Recharts пишет
    # инлайновые стили в SVG. script-src — только 'self'.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 15s;
    keepalive_timeout 30s;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS + переменная в proxy_pass: nginx резолвит `api` на каждом
    # запросе, а не кэширует IP на старте — API переживает пересоздание
    # контейнера без рестарта фронтенда.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Vite выпускает файлы с content-hash в имени — кэшируем навсегда.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API-запросы — на FastAPI-сервис из compose-сети.
    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Анализ может идти минуты — не рвём соединение раньше времени.
        proxy_read_timeout 300s;
    }

    # SPA: любой путь отдаёт index.html, роутинг на клиенте.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
