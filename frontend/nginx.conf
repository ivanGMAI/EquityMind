server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API-запросы уходят на FastAPI-сервис из docker-compose.
    # Путь сохраняется целиком: /api/health -> api:8000/api/health.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Анализ может идти минуты — не рвём соединение раньше времени.
        proxy_read_timeout 300s;
    }

    # SPA: любой путь отдаёт index.html, роутинг на клиенте.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
